version: '3.8'

services:
  fastapi-app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mcp-server

  mcp-server:
    build: .
    command: uvicorn app.mcp_server:mcp_app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"

  # NEW FRONTEND SERVICE
  streamlit-ui:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - fastapi-app